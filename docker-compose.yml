
services:
  openhands:
    build:
      context: ./
      dockerfile: ./containers/app/Dockerfile
    image: openhands:latest
    container_name: openhands-app-${DATE:-}
    environment:
      - AGENT_SERVER_IMAGE_REPOSITORY=${AGENT_SERVER_IMAGE_REPOSITORY:-ghcr.io/openhands/agent-server}
      - AGENT_SERVER_IMAGE_TAG=${AGENT_SERVER_IMAGE_TAG:-1.28.0-python}
      #- SANDBOX_USER_ID=${SANDBOX_USER_ID:-1234} # enable this only if you want a specific non-root sandbox user but you will have to manually adjust permissions of ~/.openhands for this user
      - WORKSPACE_MOUNT_PATH=${WORKSPACE_BASE:-$PWD/workspace}
      # Jira auth
      - JIRA_EMAIL=${JIRA_EMAIL}
      - JIRA_API_KEY=${JIRA_API_KEY}
      - JIRA_DOMAIN=${JIRA_DOMAIN}
      - JIRA_TARGET_ACCOUNT_ID=${JIRA_TARGET_ACCOUNT_ID}

      # LLM routing
      - LMNR_BASE_URL=${LMNR_BASE_URL}
      - LMNR_HTTP_PORT=${LMNR_HTTP_PORT}
      - LMNR_FORCE_HTTP=${LMNR_FORCE_HTTP}
      - LMNR_PROJECT_API_KEY=${LMNR_PROJECT_API_KEY}

      # Automation defaults
      - OH_AUTOMATION_DEFAULT_MAX_BUDGET=${OH_AUTOMATION_DEFAULT_MAX_BUDGET}
      - OH_AUTOMATION_DEFAULT_MAX_ITERATIONS=${OH_AUTOMATION_DEFAULT_MAX_ITERATIONS}

      # GitHub App authentication (replaces PAT)
      - GITHUB_APP_ID=${GITHUB_APP_ID}
      - GITHUB_APP_PRIVATE_KEY=${GITHUB_APP_PRIVATE_KEY}
      - GITHUB_APP_INSTALLATION_ID=${GITHUB_APP_INSTALLATION_ID}

      # Model selection for complexity tiers
      - OH_JIRA_COMPLEX_MODEL=${OH_JIRA_COMPLEX_MODEL}
      - OH_JIRA_MEDIUM_MODEL=${OH_JIRA_MEDIUM_MODEL}
      - OH_JIRA_LOW_MODEL=${OH_JIRA_LOW_MODEL}

      # Analysis LLM (separate from task LLM)
      - OH_JIRA_ANALYSIS_MODEL=${OH_JIRA_ANALYSIS_MODEL}
      - OH_JIRA_ANALYSIS_API_KEY=${OH_JIRA_ANALYSIS_API_KEY}
      - OH_JIRA_ANALYSIS_BASE_URL=${OH_JIRA_ANALYSIS_BASE_URL}
      - OH_JIRA_ANALYSIS_MAX_TOKENS=${OH_JIRA_ANALYSIS_MAX_TOKENS}
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/.openhands:/.openhands
      - ${WORKSPACE_BASE:-$PWD/workspace}:/opt/workspace_base
    pull_policy: build
    stdin_open: true
    tty: true
